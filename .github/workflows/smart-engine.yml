name: Smart Engine

on:
  schedule:
    # Stagger modes so the global engine lease does not discard useful work.
    - cron: "2,17,32,47 * * * *"
    - cron: "25 1,7,13,19 * * *"
    - cron: "10 * * * *"
    - cron: "40 */2 * * *"
    - cron: "24 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Engine mode
        required: true
        default: refresh
        type: choice
        options:
          - refresh
          - discovery
          - catalog
          - maintenance
      market:
        description: eBay market
        required: true
        default: US
        type: choice
        options:
          - US
          - GB

permissions:
  contents: read
  id-token: write

concurrency:
  group: smart-engine-${{ github.event.schedule || inputs.mode }}
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Select engine mode
        id: mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          MANUAL_MODE: ${{ inputs.mode }}
          MANUAL_MARKET: ${{ inputs.market }}
        run: |
          market="US"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            mode="$MANUAL_MODE"
            market="$MANUAL_MARKET"
          elif [[ "$EVENT_SCHEDULE" == "2,17,32,47 * * * *" ]]; then
            mode="refresh"
          elif [[ "$EVENT_SCHEDULE" == "25 1,7,13,19 * * *" ]]; then
            mode="refresh"
            market="GB"
          elif [[ "$EVENT_SCHEDULE" == "10 * * * *" ]]; then
            mode="discovery"
          elif [[ "$EVENT_SCHEDULE" == "40 */2 * * *" ]]; then
            mode="discovery"
            market="GB"
          elif [[ "$EVENT_SCHEDULE" == "24 4 * * *" ]]; then
            mode="catalog"
          else
            mode="maintenance"
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "market=$market" >> "$GITHUB_OUTPUT"

      - name: Request GitHub OIDC token
        id: oidc
        shell: bash
        run: |
          response=$(curl --fail --silent --show-error \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=cardpricelab-smart-engine")
          token=$(jq -r '.value' <<< "$response")
          test -n "$token" && test "$token" != "null"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$token"

      - name: Run Smart Engine tick
        shell: bash
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          ENGINE_MODE: ${{ steps.mode.outputs.mode }}
          ENGINE_MARKET: ${{ steps.mode.outputs.market }}
        run: |
          curl --fail --silent --show-error \
            --max-time 70 \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            "https://cardpricelab.com/api/cron/ebay-ingestion?mode=$ENGINE_MODE&market=$ENGINE_MARKET"
